<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login" class="container">
        <h2>Tere tulemast Typeri mängu!</h2>
        <button id="googleLogin">Logi sisse Google'iga</button>
    </div>

    <div id="userInfo" class="container">
        <div id="welcomeText"></div>
        <p id="instructions">Kirjuta ekraanil olev sõna võimalikult kiiresti. Vale täht muudab sõna korraks punaseks.</p>
        <button id="startGame">Alusta mängu</button>
        <button id="logout">Vaheta kasutajat</button>
    </div>
    <div class="summary">
        <div id="counter" class="container">
            <div id="time"></div>
        </div>

        <div id="info" class="container">
            <div id="wordcount"></div>
        </div>

        <div id="wordContainer" class="container">
            <div id="word"></div>
            <div id="score"></div>
        </div>
    </div>

    <div id="endGame" class="container">
        <div id="resultMessage"></div>
        <button id="playAgain">Mängi uuesti</button>
        <button id="switchUser">Vaheta kasutajat</button>
        <div id="resultImageContainer"></div>
    </div>
    <!-- Trigger/Open The Modal -->
    <button id="myBtn">Vaata tulemusi</button>

    <!-- The Modal -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>

            <div id="resultsContainer" class="container">
                <h2>TOP 20</h2>
                <div id="results"></div>
            </div>

            <p>Siiani kõik, suudaksid paremini?</p>
        </div>
    </div>
    

    <script type="module" src="typer.js"></script>
</body>
</html>
