<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="index.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    </style>
</head>

<body>
    <audio id="myAudio">
        <source src="./public/gamestart.mp3" type="audio/ogg" />
    </audio>
    <audio id="activeAudio">
        <source src="./public/activemusic.mp3" type="audio/ogg" />
    </audio>
    <audio id="winGood">
        <source src="./public/winGood.mp3" type="audio/ogg" ->
    </audio>
    <audio id="keypress">
        <source src="./public/keypress.mp3" type="audio/ogg" ->
    </audio>
    <audio id="winBad">
        <source src="./public/winBad.mp3" type="audio/ogg" ->
    </audio>
    <div id="navbar">
        <h1 id="title">TYPER</h1>
        <button id="leaderboardsBtn">Leaderboards</button>
        <button id="customizeBtn">Customization</button>
    </div>
    <div id="name">
        <input type="button" id="startGame" value="START GAME"><br>
        <div id="DifficultySelector">Difficulty: <select name="difficutly" id="difficulyDropdown">
                <div id="dropdownContent">
                    <option value="easy">Easy</option>
                    <option value="normal">Normal</option>
                    <option value="hard">Hard</option>
                    <option value="death sentence">Death Sentence</option>
                </div>
            </select></div>

    </div>
    <div id="allContainer">
        <div id="wordContainer" class="container">
            <div id="word">3</div>
            <div id="timer">Timer: 0</div>
        </div>
        <div id="info" class="container">
            <div id="wordcount"></div>
        </div>
    </div>
    <div id="insertNameContainer">
        <img id="imgContainer" src="">
        <h2 id="imgText">Your speed: Cheetah</h2>
        <label for="nameInput">Please Enter Your name:<br>
            <input autocomplete="off" id="nameInput" /><br>
            <button id="saveName">Save</button>
        </label>
    </div>
    <div id="leaderboardContainer" class="containerHidden">
        <span>Sort by:</span>
        <button class="sortBtn" id="score">Score</button>
        <button class="sortBtn" id="time">Time</button>
        <div>Or</div>
        <div class="sortBtn" id="difficultySort">Difficulty:
            <select name="difficutlySort" id="difficulySortDropdown">
                <option value="easy">Easy</option>
                <option value="normal">Normal</option>
                <option value="hard">Hard</option>
                <option value="death sentence">Death Sentence</option>
            </select><button id="sortByDiff">Sort</button></div><br><br>
        <div id="results"></div>
    </div>
    <div id="customizationContainer" class="containerHidden">
        <button class="color" id="white">Default Background</button>
        <button class="color" id="red">Red Background</button>
        <button class="color" id="pink">Pink Background</button>
    </div>
</body>

</html>
