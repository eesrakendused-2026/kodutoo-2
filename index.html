<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="TypeRace.js" defer></script>
    <link rel="stylesheet" href="TypeRace.css">
    <!-- Requirement 1: Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <title>Typer - Trükkimiskiirus</title>
</head>
<body>

<!-- Taust-animatsioon -->
<div class="bg-grid"></div>

<!-- Nimesisestus -->
<div id="name" class="screen">
    <div class="name-card">
        <div class="logo-area">
            <span class="logo-icon">⌨</span>
            <h1 class="logo-text">TYPER</h1>
            <p class="logo-sub">Trükkimiskiiruse test</p>
        </div>
        <div class="input-group">
            <label for="username">Sinu nimi</label>
            <input type="text" id="username" placeholder="Sisesta nimi..." autocomplete="off">
            <button id="submitname" class="btn-primary">
                <span>Alusta</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
        <!-- Edetabel allpool -->
        <div class="leaderboard-preview">
            <h3>🏆 TOP 20</h3>
            <div id="results"></div>
        </div>
    </div>
</div>

<!-- Loendur -->
<div id="counter" class="screen">
    <div class="countdown-wrap">
        <p class="countdown-label">Alustab</p>
        <div id="time" class="countdown-number">3</div>
    </div>
</div>

<!-- Mäng -->
<div id="gameScreen" class="screen" style="display:none;">
    <div id="info" class="info-bar">
        <div id="wordcount" class="info-chip">0/0</div>
        <div id="accuracy-display" class="info-chip">Täpsus: 100%</div>
        <div id="live-wpm" class="info-chip">WPM: —</div>
    </div>

    <div id="wordContainer" class="word-area">
        <div id="word" class="word-display">...</div>
        <div id="progress-wrap">
            <div id="progress-bar"></div>
        </div>
    </div>
</div>

<!-- Requirement 2: Modal tulemustega -->
<div id="resultsModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <button class="modal-close" id="closeModal" aria-label="Sulge">✕</button>

        <!-- Requirement 3: Tulemused eraldi elementides pealkirjadega -->
        <h2 class="modal-title">Mängu tulemus</h2>

        <div class="result-grid">
            <div class="result-card">
                <span class="result-label">Nimi</span>
                <span class="result-value" id="res-name">—</span>
            </div>
            <div class="result-card highlight">
                <span class="result-label">Aeg</span>
                <span class="result-value" id="res-time">—</span>
            </div>
            <div class="result-card">
                <span class="result-label">Sõnad</span>
                <span class="result-value" id="res-words">—</span>
            </div>
            <div class="result-card">
                <span class="result-label">Täpsus</span>
                <span class="result-value" id="res-accuracy">—</span>
            </div>
            <div class="result-card highlight">
                <span class="result-label">WPM (kiirus)</span>
                <span class="result-value" id="res-wpm">—</span>
            </div>
            <div class="result-card">
                <span class="result-label">Edetabel</span>
                <span class="result-value" id="res-rank">—</span>
            </div>
        </div>

        <!-- Requirement 4: Pilt vastavalt WPM-ile -->
        <div class="speed-badge-wrap">
            <div id="speed-badge" class="speed-badge">
                <span id="speed-icon">🐢</span>
                <div>
                    <span id="speed-label">Algaja</span>
                    <span id="speed-range" class="speed-range">0–10 WPM</span>
                </div>
            </div>
        </div>

        <div class="modal-actions">
            <button id="playAgainBtn" class="btn-primary">
                <span>Mängi uuesti</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            </button>
        </div>
    </div>
</div>

<!-- Requirement 8: Heli elemendid (Web Audio API kaudu genereeritud) -->
<!-- Helid genereeritakse JS-ga, ei vaja faile -->
