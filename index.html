<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="typer.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Typer</title>
</head>
<body>
    <div id="name" class="container">
        <label for="name">Sisesta oma nimi</label>
        <input type="text" id="username">
        <input type="button" value="Salvesta" id="submitname">
    </div>

    <div id="counter" class="container">
        <div id="time"></div>
    </div>

    <div id="info" class="container">
        <div id="wordcount"></div>
    </div>

    <div id="wordContainer" class="container">
        <div id="word"></div>
        <div id="score"></div>
    </div>

    <div id="resultsContainer">
        <div id="modalContent">
            <span class="close">&times;</span>
            <h2>Edetabel</h2>
            <div id="userScore" class="user-score-box">
                <div id="scoreContent"></div>
            </div>
            <div class="results-header">
                <span class="header-rank">Koht</span>
                <span class="header-name">Nimi</span>
                <span class="header-time">Aeg (s)</span>
            </div>
            <div id="results"></div>
        </div>
    </div>
    <button id="showResultsBtn" style="display: none;">Näita tulemusi</button>
    <button id="playAgainBtn" style="display: none;" onclick="window.location.reload()">Mängi uuesti</button>
    
</body>
</html>
